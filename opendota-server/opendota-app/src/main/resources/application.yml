spring:
  application:
    name: opendota-server
  threads:
    virtual:
      enabled: true               # 启用 Java 虚拟线程
  profiles:
    # dev profile 自动挂载模拟器与开发期 mock 数据(application-dev.yml)
    # 生产环境必须通过 SPRING_PROFILES_ACTIVE 显式控制,默认不激活任何额外 profile
    active: ${SPRING_PROFILES_ACTIVE:}
  datasource:
    # 默认指向本地 docker-compose,CI / 生产用 SPRING_DATASOURCE_URL 环境变量覆盖
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opendota}
    username: ${SPRING_DATASOURCE_USERNAME:opendota}
    password: ${SPRING_DATASOURCE_PASSWORD:opendota}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

  kafka:
    # Kafka 集群地址,生产通过环境变量覆盖
    bootstrap-servers: ${SPRING_KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      # 架构 §3.3.1.1: 幂等 producer 防止网络抖动导致重复
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.apache.kafka.common.serialization.StringSerializer
      acks: all
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 5
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      auto-offset-reset: earliest

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,prometheus

logging:
  level:
    com.opendota: DEBUG
    org.springframework.web: INFO

# OpenDOTA 业务配置命名空间
opendota:
  security:
    jwt:
      # Base64 编码的 HMAC 密钥(>=256 bit),生产必须通过环境变量注入
      secret: ${OPENDOTA_JWT_SECRET:}
      expiry-seconds: ${OPENDOTA_JWT_EXPIRY:28800}
      issuer: opendota
    permit-all-paths:
      - /error
      - /api/hello
      - /actuator/**
      - /auth/login
      - /auth/refresh
      - /swagger-ui/**
      - /v3/api-docs/**
  simulator:
    # v1.4 B1:生产必须保持 false。dev profile 在 application-dev.yml 覆盖为 true
    enabled: false
    broker-url: tcp://localhost:1883
    doip-enabled: true
    doip-port: 13400
    mock-min-latency-ms: 100
    mock-max-latency-ms: 500
    vehicles: []
  mqtt:
    # 云端 MQTT 总开关。单测可用 @TestPropertySource(properties="opendota.mqtt.enabled=false") 关闭
    enabled: ${OPENDOTA_MQTT_ENABLED:true}
    broker-url: ${OPENDOTA_MQTT_BROKER_URL:tcp://localhost:1883}
    topic-prefix: ${OPENDOTA_MQTT_TOPIC_PREFIX:dota/v1}
    client-id-prefix: ${OPENDOTA_MQTT_CLIENT_ID_PREFIX:opendota-cloud}
    username: ${OPENDOTA_MQTT_USERNAME:opendota-cloud}
    password: ${OPENDOTA_MQTT_PASSWORD:opendota-cloud}
    default-qos: 1
    keep-alive-seconds: 60
    connection-timeout-seconds: 10
    clean-session: false
  outbox:
    relay:
      # Outbox Relay Worker 轮询间隔(ms),峰值可调至 100
      fixed-delay: ${OPENDOTA_OUTBOX_RELAY_DELAY:200}
    archive:
      # 归档 cron 表达式,默认每天凌晨 3 点
      cron: ${OPENDOTA_OUTBOX_ARCHIVE_CRON:0 0 3 * * ?}
  kafka:
    topic:
      # 任务分发队列(架构 §4.4.1)
      dispatch-queue: ${OPENDOTA_KAFKA_TOPIC_DISPATCH:task-dispatch-queue}
      # 车辆生命周期事件(架构 §4.5)
      vehicle-lifecycle: ${OPENDOTA_KAFKA_TOPIC_LIFECYCLE:vehicle-lifecycle}
      # 死信队列
      dlq: ${OPENDOTA_KAFKA_TOPIC_DLQ:task-dispatch-dlq}
  dispatch:
    # jitter 分桶数(架构 §4.4.4)
    bucket-count: ${OPENDOTA_DISPATCH_BUCKET_COUNT:60}
    # 最大 jitter 窗口(ms)
    jitter-max-ms: ${OPENDOTA_DISPATCH_JITTER_MAX_MS:30000}
    # 最大重试次数,超限进 DLQ
    max-retries: ${OPENDOTA_DISPATCH_MAX_RETRIES:5}
    rate-limit:
      # 全局每秒配额(架构 §4.4.2)
      global-per-second: ${OPENDOTA_RATE_GLOBAL:500}
      # 租户每秒配额
      tenant-per-second: ${OPENDOTA_RATE_TENANT:100}
      # 单 VIN 每分钟配额
      vin-per-minute: ${OPENDOTA_RATE_VIN:10}
  lifecycle:
    reconcile:
      # 车辆在线状态对账开关(架构 §4.6.4),本地开发可关闭
      enabled: ${OPENDOTA_LIFECYCLE_RECONCILE_ENABLED:true}
      # EMQX 5.x REST API 地址
      emqx-api-url: ${OPENDOTA_EMQX_API_URL:http://localhost:18083/api/v5}
      # EMQX Dashboard API Key/Secret(对账作业需要查询 /clients)
      emqx-api-key: ${OPENDOTA_EMQX_API_KEY:}
      emqx-api-secret: ${OPENDOTA_EMQX_API_SECRET:}
