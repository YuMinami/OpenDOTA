# ============================================================
# 开发 profile:激活模拟器,方便本地 Phase 0 / Phase 2 联调
#
# 启动方式:
#   mvn spring-boot:run -Dspring-boot.run.profiles=dev
# 或:
#   SPRING_PROFILES_ACTIVE=dev mvn spring-boot:run
#
# ⚠️ 生产环境严禁激活本 profile。CI/CD 应在构建阶段 grep 禁止。
# ============================================================

spring:
  flyway:
    # dev 额外挂 db/dev 路径,载入 R__mock_seed.sql 初始化 mock 数据
    # 生产环境绝不挂载本路径,防止 TRUNCATE + mock 数据污染
    enabled: true
    locations: classpath:db/migration,classpath:db/dev

logging:
  level:
    com.opendota.simulator: INFO

opendota:
  security:
    jwt:
      # dev 专用测试密钥,仅 32 字节,生产禁止使用
      secret: dGVzdC1zZWNyZXQtZm9yLWRldi1vbmx5LTMyYnl0ZXM=
  simulator:
    enabled: true
    # 启用两辆模拟车,覆盖在线/离线场景
    # - VIN1 与 sql/init_opendota.sql mock 数据保持一致,便于 Grafana/PG 查询
    # - VIN2 启动离线,演示离线 → 上线后 pending_online replay
    vehicles:
      - vin: LSVWA234567890123
        workstation-id: EOL-STN-A-01
        start-online: true
        clock-drift-ms: 0
      - vin: LSVWB987654321098
        start-online: false
        clock-drift-ms: 0
