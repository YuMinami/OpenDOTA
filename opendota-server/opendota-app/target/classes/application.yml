spring:
  application:
    name: opendota-server
  threads:
    virtual:
      enabled: true               # 启用 Java 虚拟线程
  profiles:
    # dev profile 自动挂载模拟器与开发期 mock 数据(application-dev.yml)
    # 生产环境必须通过 SPRING_PROFILES_ACTIVE 显式控制,默认不激活任何额外 profile
    active: ${SPRING_PROFILES_ACTIVE:}
  datasource:
    # 默认指向本地 docker-compose,CI / 生产用 SPRING_DATASOURCE_URL 环境变量覆盖
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opendota}
    username: ${SPRING_DATASOURCE_USERNAME:opendota}
    password: ${SPRING_DATASOURCE_PASSWORD:opendota}
    driver-class-name: org.postgresql.Driver
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: true
    locations: classpath:db/migration
    validate-on-migrate: true

server:
  port: 8080

logging:
  level:
    com.opendota: DEBUG
    org.springframework.web: INFO

# OpenDOTA 业务配置命名空间
opendota:
  simulator:
    # v1.4 B1:生产必须保持 false。dev profile 在 application-dev.yml 覆盖为 true
    enabled: false
    broker-url: tcp://localhost:1883
    doip-enabled: true
    doip-port: 13400
    mock-min-latency-ms: 100
    mock-max-latency-ms: 500
    vehicles: []
  mqtt:
    broker-url: ${OPENDOTA_MQTT_BROKER_URL:tcp://localhost:1883}
    topic-prefix: dota/v1
