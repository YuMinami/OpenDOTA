# ============================================================
# OpenDOTA CI 主流程
# ------------------------------------------------------------
# 参考: doc/opendota_development_plan.md §3.5
#
# Gate 顺序: build → unit-tests → (PR 额外) integration → conformance
# 缓存 ~/.m2 加速构建
# 失败上传 target/surefire-reports/ 做 artifact
# ============================================================

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  MAVEN_OPTS: "-Xmx2g -Dorg.slf4j.simpleLogger.showDateTime=true"
  MAVEN_CLI: "-B -ntp -f opendota-server/pom.xml"

jobs:
  # -------------------- build --------------------
  # 先全量 install 一次,把 artifact 灌到 ~/.m2/repository,
  # 后续 job 直接跳过编译。
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn clean install (skip tests)
        run: mvn ${{ env.MAVEN_CLI }} clean install -DskipTests

      - name: 上传构建产物 (jar)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-jars
          path: opendota-server/**/target/*.jar
          if-no-files-found: warn
          retention-days: 3

  # -------------------- unit-tests --------------------
  unit-tests:
    name: unit-tests
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn test
        run: mvn ${{ env.MAVEN_CLI }} test

      - name: 失败时上传 surefire 报告
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-unit
          path: opendota-server/**/target/surefire-reports/
          retention-days: 7

  # -------------------- integration --------------------
  # 仅 PR 触发: Testcontainers 起 PG/EMQX/Kafka/Redis
  integration:
    name: integration
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn verify -Pintegration
        run: mvn ${{ env.MAVEN_CLI }} verify -Pintegration -DskipITs=false
        continue-on-error: true # profile 尚未在所有模块启用,后续 Phase 1+ 强制

      - name: 失败时上传 failsafe 报告
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: failsafe-reports-integration
          path: opendota-server/**/target/failsafe-reports/
          retention-days: 7

  # -------------------- conformance --------------------
  # 仅 PR 触发: 协议附录 D 30 条符合性测试 (Phase 2+ 开始接入)
  conformance:
    name: conformance
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: mvn test -Pconformance
        run: mvn ${{ env.MAVEN_CLI }} test -Pconformance
        continue-on-error: true # 用例集 Phase 2 起开始增补
